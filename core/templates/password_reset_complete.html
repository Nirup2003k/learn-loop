{% extends 'base.html' %}
{% load static %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'core/css/password_reset_complete.css' %}">
{% endblock %}

{% block content %}

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Password Changed!</h2>
        <p class="subtitle">Your password has been set. You may go ahead and log in now.</p>
        
        <a href="{% url 'login' %}" class="auth-btn">Log In</a>
    </div>
</div>
{% endblock %}
