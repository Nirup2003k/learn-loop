{% extends 'base.html' %}
{% load static %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'core/css/register.css' %}">
{% endblock %}

{% block content %}

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="subtitle">Join the community and start exchanging skills.</p>

        {% if error %}
            <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="auth-input-group">
                <label>Username</label>
                <input type="text" name="username" class="auth-input" placeholder="Choose a username" required>
            </div>
            <div class="auth-input-group">
                <label>Email Address</label>
                <input type="email" name="email" class="auth-input" placeholder="you@example.com" required>
            </div>
            <div class="auth-input-group">
                <label>Password</label>
                <input type="password" name="password" class="auth-input" placeholder="Create a password" required>
            </div>
            <div class="auth-input-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" class="auth-input" placeholder="Confirm your password" required>
            </div>
            
            <button type="submit" class="auth-btn">Sign Up</button>
        </form>

        <div class="auth-link">
            Already have an account? <a href="/login/">Log in</a>
        </div>
    </div>
</div>
{% endblock %}
